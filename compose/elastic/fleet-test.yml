services:
  fleet-server:
    container_name: fleet-server
    image: docker.elastic.co/elastic-agent/elastic-agent-complete-wolfi:${STACK_VERSION}
    # Run as 'root' instead of 'elastic-agent' (uid 1000) to allow reading
    # 'docker.sock' and the host's filesystem.
    user: root
    # volumes:
    #   - ./certs:/usr/share/elastic-agent/config/certs:z
    #   - ./fleetdata:/usr/share/fleet/data:z
    volumes:
      - ./certs:/usr/share/elastic-agent/config/certs:z
      - ./fleetdata:/usr/share/elastic-agent/state:Z
      # - type: bind
      #   source: /var/lib/docker/containers
      #   target: /var/lib/docker/containers
      #   read_only: true
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
        read_only: true
    environment:
      FLEET_SERVER_ELASTICSEARCH_HOST: https://elasticsearch:9200
      ELASTICSEARCH_HOST: https://elasticsearch:9200
      FLEET_SERVER_ELASTICSEARCH_CA: /usr/share/elastic-agent/config/certs/ca/ca.crt
      FLEET_SERVER_CERT: /usr/share/elastic-agent/config/certs/fleet-server/fleet-server.crt
      FLEET_SERVER_CERT_KEY: /usr/share/elastic-agent/config/certs/fleet-server/fleet-server.key
      FLEET_CA: /usr/share/elastic-agent/config/certs/ca/ca.crt
      ELASTICSEARCH_CA: /usr/share/elastic-agent/config/certs/ca/ca.crt
      KIBANA_CA: /usr/share/elastic-agent/config/certs/ca/ca.crt
      FLEET_SERVER_ENABLE: '1'
      #FLEET_SERVER_INSECURE_HTTP: '1'
      #FLEET_SERVER_HOST: 0.0.0.0
      FLEET_SERVER_PORT: 8220
      FLEET_URL: https://fleet-server:8220
      FLEET_SERVER_POLICY_ID: fleet-server-policy
      # Fleet plugin in Kibana
      KIBANA_FLEET_SETUP: '1'
      KIBANA_FLEET_HOST: https://kibana:5601
      KIBANA_FLEET_USERNAME: elastic
      KIBANA_FLEET_PASSWORD: ${ELASTIC_PASSWORD}
      KIBANA_FLEET_CA: /usr/share/elastic-agent/config/certs/ca/ca.crt
      # Enrollment.
      # (a) Auto-enroll using basic authentication
      ELASTICSEARCH_USERNAME: elastic
      ELASTICSEARCH_PASSWORD: ${ELASTIC_PASSWORD:-}
      # (b) Enroll using a pre-generated service token
      #FLEET_SERVER_SERVICE_TOKEN: <service_token>
    ports:
      - 8220:8220
    hostname: fleet-server
    # Elastic Agent does not retry failed connections to Kibana upon the initial enrollment phase.
    restart: on-failure
    networks:
      - elastic
    depends_on:
      elasticsearch:
        condition: service_healthy
      kibana:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: ${FLEET_MEM_LIMIT}
          cpus: ${FLEET_CPU_LIMIT}
        reservations:
          memory: ${FLEET_MEM_RESV}
          cpus: ${FLEET_CPU_RESV}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl --cacert /usr/share/kibana/config/certs/ca/ca.crt -s -I https://localhost:8220 | grep -q 'HTTP/2 302'",
        ]
      interval: 10s
      timeout: 10s
      retries: 120
