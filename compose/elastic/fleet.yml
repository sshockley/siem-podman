services:
  fleet:
    # depends_on:
    #   es01:
    #     condition: service_healthy
    #   kibana:
    #     condition: service_healthy
    container_name: fleet
    image: docker.elastic.co/elastic-agent/elastic-agent:${STACK_VERSION}
    #image: docker.elastic.co/elastic-agent/elastic-agent-complete-wolfi:${STACK_VERSION}
    networks:
      - elastic
    volumes:
      - ./certs:/usr/share/elastic-agent/config/certs:z
      - ./fleetdata:/usr/share/fleet/data:z
    ports:
      - ${FLEET_PORT}:8220
    restart: on-failure
    environment:
      - FLEET_SERVER_ENABLE=true
      - FLEET_SERVER_ELASTICSEARCH_HOST=https://es01:9200
      - FLEET_SERVER_SERVICE_TOKEN=${FLEET_SERVER_SERVICE_TOKEN}
      #- FLEET_ENROLLMENT_TOKEN=<enrollment-token>
      - FLEET_ENROLL=1
      - FLEET_URL=${FLEET_URL}

      - FLEET_SERVER_CERT=/usr/share/elastic-agent/config/certs/fleet/fleet.crt
      - FLEET_SERVER_CERT_KEY=/usr/share/elastic-agent/config/certs/fleet/fleet.key
      # - FLEET_SERVER_HOST=0.0.0.0
      # - FLEET_SERVER_PORT=8220
      # - FLEET_SERVER_POLICY_ID=fleet-server-policy
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=${SAVED_OBJECTS_ENCRYPTIONKEY}

      - KIBANA_FLEET_SETUP=1
      - KIBANA_FLEET_HOST=http://kibana:5601
      - KIBANA_USERNAME=elastic
      - KIBANA_PASSWORD=${ELASTIC_PASSWORD}

      - ELASTICSEARCH_HOST=https://es01:9200
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=${ELASTIC_PASSWORD}
      - ELASTICSEARCH_CA=/usr/share/elastic-agent/config/certs/ca/ca.crt
    deploy:
      resources:
        limits:
          memory: ${FLEET_MEM_LIMIT}
          cpus: ${FLEET_CPU_LIMIT}
        reservations:
          memory: ${FLEET_MEM_RESV}
          cpus: ${FLEET_CPU_RESV}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s -I http://localhost:5601 | grep -q 'HTTP/1.1 302 Found'",
        ]
      interval: 10s
      timeout: 10s
      retries: 120

networks:
  elastic:
    driver: bridge
    ipam:
      config:
        - subnet: 100.64.0.0/24