  nginx:
    depends_on:
      kibana:
        condition: service_healthy
      # fleet:
      #   condition: service_healthy
    image: nginx:stable-alpine-slim
    networks:
      - elastic
    restart: unless-stopped
    volumes:
      - ./nginx/conf/nginx.conf:/etc/nginx/nginx.conf:Z,ro
      - ./nginx/conf/conf.d:/etc/nginx/conf.d:Z
      - ./nginx/conf/templates:/etc/nginx/templates:Z,ro
      - ./nginx/log:/var/log/nginx:z
      - ./nginx/certs:/certs:z,ro
    ports:
      - 80:80
      - 443:443
      - ${ES_PORT}:9200
      - ${FLEET_PORT}:8220
    environment:
      - SERVER_NAME=${SERVER_NAME}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/usr/bin/wget --no-verbose --tries=1 --spider http://localhost/ || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 120
    deploy:
      resources:
        limits:
          memory: ${NGINX_MEM_LIMIT}
          cpus: ${NGINX_CPU_LIMIT}
        reservations:
          memory: ${NGINX_MEM_RESV}
          cpus: ${NGINX_CPU_RESV}

networks:
  elastic:
    driver: bridge
    ipam:
      config:
        - subnet: 100.64.0.0/24